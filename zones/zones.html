<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Зоны доставки</title>

  <!-- общий css (в папке zones надо подниматься на уровень выше) -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <div class="topbar">
    <div class="container">
      <div class="backRow">
        <button class="backBtn" id="backBtn" type="button">
          <img src="assets/icons/back.svg" alt="back" />
          <span>Назад</span>
        </button>

<button class="lockBtn" id="editorBtn" type="button" title="Редактор зон">
    <img src="assets/icons/lock.svg" alt="" />
  </button>
      </div>

      <div class="headerRow u-pt0" >
        <h1 class="siteTitle">Зоны доставки</h1>
      </div>

      <div class="controls u-pt0" >
        <div class="searchWrap u-max520" >
          <!-- ВАЖНО: id="addrInput" -->
          <input id="addrInput" placeholder="Оренбург: введите адрес..." autocomplete="off" />
          <button class="iconBtn" id="clearAddr" title="Очистить">✕</button>
        </div>
      </div>

      <div class="zoneInfo u-hidden" id="zoneInfo" ></div>
    </div>
  </div>

  <div  class="u-pad14">
    <div id="map" class="zoneMap zonesMapBox" ></div>
  </div>

  <!-- Яндекс карты: package.full обязателен для SuggestView -->
  <script src="https://api-maps.yandex.ru/2.1/?apikey=62bb0bf1-3235-41f0-b3de-b09cfed11b52&lang=ru_RU&load=package.full"></script>
  <!-- Turf для проверки попадания точки -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
  
<script>
  const editorBtn = document.getElementById("editorBtn");
  if (editorBtn) {
    editorBtn.addEventListener("click", () => {
      window.location.href = "editor.html?edit=1";
    });
  }
</script>

  <!-- относительный путь -->
  <script src="js/zones.js"></script>
</body>
</html>
