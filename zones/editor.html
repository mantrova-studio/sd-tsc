<!doctype html>

  Файл: editor.html

-->
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Редактор зон</title>

  <link rel="stylesheet" href="./css/style.css" />

  
</head>

<body>
  <div class="topbar">
    <div class="container">

      <!-- TOP ROW: Back (left) + History/Reset (right) -->
      <div class="backRow backRowEditor">
        <button class="backBtn" id="backBtn" type="button">
          <img src="assets/icons/back.svg" alt="back" />
          <span>Назад</span>
        </button>

        <div class="backRightBtns">
          <!-- history -->
          <button class="edIconBtn" id="histBtn" type="button" data-tip="История версий (GitHub)">
            <img src="assets/icons/editor-icon-1.svg" alt="" />
          </button>

          <!-- reset local -->
          <button class="edIconBtn edDanger" id="resetLocalBtn" type="button" data-tip="Сброс локального черновика">
            <img src="assets/icons/editor-icon-2.svg" alt="" />
          </button>
        </div>
      </div>

      <div class="headerRow u-pt0" >
        <h1 class="siteTitle">Редактор зон</h1>
      </div>

      <!-- MAIN TOOLBAR (without History + Reset) -->
      <div class="edBar">
        <!-- draw -->
        <button class="edIconBtn" id="drawBtn" type="button" data-tip="Новый полигон">
          <img id="drawIcon" class="icon24" src="assets/icons/plus.svg" alt="" />
        </button>

        <!-- vertices -->
        <button class="edIconBtn" id="editBtn" type="button" data-tip="Редактировать вершины">
          <img id="editIcon" class="icon24" src="assets/icons/triangle.svg" alt="" />
        </button>

        <!-- delete -->
        <button class="edIconBtn edDanger" id="delBtn" type="button" data-tip="Удалить зону">
          <img src="assets/icons/editor-icon-3.svg" alt="" />
        </button>

        <!-- export -->
        <button class="edIconBtn" id="exportBtn" type="button" data-tip="Экспорт GeoJSON">
          <img src="assets/icons/editor-icon-file.svg" alt="" />
        </button>

        <!-- github save -->
        <button class="edIconBtn edSuccess" id="ghBtn" type="button" data-tip="Сохранить в GitHub (коммит)">
          <img src="assets/icons/editor-icon-5.svg" alt="" />
        </button>
      </div>
    </div>
  </div>

  <div class="editorLayout">
    <div>
      <div id="map" class="zoneMap u-round18-clip" ></div>
    </div>

    <aside class="editorSide">
      <div class="edTitle">Параметры зоны</div>

      <div class="edLabel">Режим файла</div>
      <select class="edSelect" id="modeSel">
        <option value="day">День (zones_day.geojson)</option>
        <option value="night">Ночь (zones_night.geojson)</option>
      </select>

      <div class="edLabel">Название зоны (props.zone)</div>
      <input class="edInput" id="zoneName" placeholder="Напр. Ф1 - Линия - 300 ₽" />

      <div class="edLabel">Описание (props.description)</div>
      <textarea class="edTextarea" id="zoneDesc" placeholder="Текст условий доставки..."></textarea>

      <div class="edRow u-mt10" >
        <button class="edBtn" id="savePropsBtn" type="button">💾 Сохранить</button>

        <label class="edBtn">
          ⤒ Импорт
          <input id="importFile" type="file" accept=".geojson,application/geo+json,application/json"  class="u-hidden">
        </label>
      </div>

      <div class="edHint">
        GitHub: “История” показывает прошлые версии текущего файла (day/night) и позволяет загрузить их в редактор.
      </div>
    </aside>
  </div>

  <!-- GitHub modal (token only) -->
  <div class="modalBack" id="ghModal">
    <div class="modal">
      <div class="modalTop">
        <div class="modalTitle">Сохранение в GitHub</div>
        <button class="modalClose" id="ghClose" type="button">✕</button>
      </div>

      <div class="edLabel">Token (Fine-grained PAT, Contents: RW)</div>
      <input class="edInput" id="ghToken" placeholder="github_pat_… или ghp_…" autocomplete="off" />

      <div class="chkRow">
        <input type="checkbox" id="ghRemember" checked />
        <label for="ghRemember">Запомнить токен в этом браузере</label>
      </div>

      <div class="modalActions">
        <button class="edBtn" id="ghTestBtn" type="button">Проверить</button>
        <button class="edBtn" id="ghSaveBtn" type="button">Сохранить</button>
      </div>

      <div class="statusLine" id="ghStatus"></div>
    </div>
  </div>

  <!-- History modal -->
  <div class="modalBack" id="histModal">
    <div class="modal">
      <div class="modalTop">
        <div class="modalTitle">История версий</div>
        <button class="modalClose" id="histClose" type="button">✕</button>
      </div>

      <div class="rowTop">
        <div class="pill" id="histPill">Файл: —</div>
        <button class="histBtn" id="histRefresh" type="button">Обновить</button>
      </div>

      <div class="statusLine" id="histStatus"></div>
      <div class="histList" id="histList"></div>
    </div>
  </div>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=62bb0bf1-3235-41f0-b3de-b09cfed11b52&lang=ru_RU&load=package.full"></script>
  <script src="js/editor.js"></script>
</body>
</html>
